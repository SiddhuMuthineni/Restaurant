<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - Savor</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .cart-section {
      padding: 120px 0 60px;
      min-height: 80vh;
    }
    .cart-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 40px;
    }

    /* Cart Items List */
    .cart-items-container {
      background: var(--dark-grey);
      border-radius: 12px;
      padding: 30px;
    }
    .cart-items-container h2 { margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 15px; }

    .cart-item {
      display: flex;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid #333;
      gap: 20px;
    }
    .cart-item:last-child { border-bottom: none; }
    
    .c-img { width: 100px; height: 100px; border-radius: 8px; overflow: hidden; flex-shrink:0; }
    .c-img img { width: 100%; height: 100%; object-fit: cover; }
    
    .c-details { flex-grow: 1; }
    .c-title { font-size: 1.2rem; margin-bottom: 5px; color: var(--cream); }
    .c-price { color: var(--warm-gold); font-weight: bold; }
    
    .quantity-control {
      display: inline-flex;
      align-items: center;
      background: #111;
      border: 1px solid #333;
      border-radius: 30px;
      overflow: hidden;
      margin-top: 10px;
    }
    .quantity-control button {
      background: none; border: none; color: white; padding: 5px 12px; cursor: pointer;
    }
    .quantity-control button:hover { background: #333; }
    .quantity-control span { padding: 0 10px; font-weight: bold; }

    .c-remove {
      background: none; border: none; color: #ff4757; font-size: 1.2rem; cursor: pointer; padding: 10px; transition: transform 0.3s;
    }
    .c-remove:hover { transform: scale(1.2); }

    .empty-cart {
      text-align: center; padding: 50px 0; color: var(--text-muted);
    }
    .empty-cart i { font-size: 4rem; margin-bottom: 20px; color: #333; }

    /* Order Summary */
    .order-summary {
      background: var(--dark-grey);
      border-radius: 12px;
      padding: 30px;
      height: fit-content;
      position: sticky;
      top: 100px;
    }
    .order-summary h3 { margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 15px; }

    .summary-row {
      display: flex; justify-content: space-between; margin-bottom: 15px; color: var(--text-muted);
    }
    .summary-total {
      display: flex; justify-content: space-between; margin-top: 20px; padding-top: 15px; border-top: 1px solid #333; font-size: 1.3rem; font-weight: bold; color: var(--cream);
    }

    .order-type { margin: 25px 0; }
    .order-type label { display: block; margin-bottom: 10px; cursor: pointer;}
    .order-type input { margin-right: 10px; accent-color: var(--rich-red); }

    .special-inst {
      width: 100%; background: #111; border: 1px solid #333; color: white; border-radius: 8px; padding: 15px; margin-bottom: 20px; resize: vertical; min-height: 80px; font-family: var(--font-body);
    }

    .btn-place-order { width: 100%; font-size: 1.1rem; padding: 15px; }

    @media(max-width: 992px) {
      .cart-grid { grid-template-columns: 1fr; }
      .order-summary { position: static; }
    }
  </style>
</head>
<body class="page-fade-in">

  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">Savor<span>.</span></a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="reservations.html">Reservations</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <div class="nav-icons">
        <a href="cart.html" class="cart-icon" style="color:var(--warm-gold);">
          <i class="fas fa-shopping-cart"></i>
          <span class="cart-badge" id="cart-badge" style="display:none;">0</span>
        </a>
        <div class="user-menu">
          <div class="avatar" id="user-avatar-name">U</div>
          <button id="logout-btn" class="logout-btn"><i class="fas fa-sign-out-alt"></i></button>
        </div>
        <div class="hamburger"><i class="fas fa-bars"></i></div>
      </div>
    </div>
  </nav>

  <main class="cart-section container">
    <h1 class="section-title">Your Order Cart</h1>
    
    <div class="cart-grid">
      <div class="cart-items-container" id="cart-list">
        <!-- Rendered by JS -->
      </div>
      
      <div class="order-summary" id="order-summary-box">
        <h3>Order Summary</h3>
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="summ-sub">₹0</span>
        </div>
        <div class="summary-row">
          <span>GST (5%)</span>
          <span id="summ-tax">₹0</span>
        </div>
        <div class="summary-row">
          <span>Delivery Charge</span>
          <span id="summ-del">₹0</span>
        </div>
        <div class="summary-total">
          <span>Total</span>
          <span id="summ-total">₹0</span>
        </div>

        <div class="order-type">
          <label><input type="radio" name="otype" value="delivery" checked> Delivery (30-45 mins)</label>
          <label><input type="radio" name="otype" value="takeaway"> Takeaway (15 mins)</label>
          <label><input type="radio" name="otype" value="dinein"> Dine-In</label>
        </div>

        <textarea class="special-inst" placeholder="Any special instructions? (e.g. Make it spicy, No onions)"></textarea>

        <button class="btn btn-primary btn-place-order" id="place-order-btn">Place Order</button>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container text-center text-muted">
      <p>&copy; 2026 Savor Restaurant.</p>
    </div>
  </footer>

  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
