<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Item Detail - Savor</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .detail-section {
      padding: 120px 0 60px;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 50px;
      align-items: start;
    }

    /* Image side */
    .detail-img {
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }
    .detail-img img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.6s ease;
    }
    .detail-img:hover img {
      transform: scale(1.1);
    }
    .detail-badge {
      position: absolute;
      top: 20px; right: 20px;
      background: var(--warm-gold);
      color: var(--deep-black);
      padding: 5px 15px;
      font-weight: bold;
      border-radius: 20px;
      z-index: 2;
    }

    /* Content side */
    .detail-content h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      color: var(--cream);
    }
    .detail-rating {
      color: var(--warm-gold);
      margin-bottom: 20px;
      font-size: 1.1rem;
    }
    .detail-price {
      font-size: 2.5rem;
      color: var(--warm-gold);
      font-weight: bold;
      margin-bottom: 20px;
    }
    .detail-desc {
      color: var(--text-muted);
      font-size: 1.1rem;
      margin-bottom: 30px;
    }
    
    .quantity-control {
      display: inline-flex;
      align-items: center;
      background: #111;
      border: 1px solid #333;
      border-radius: 30px;
      margin-bottom: 30px;
      overflow: hidden;
    }
    .qty-btn {
      background: none;
      border: none;
      color: var(--cream);
      padding: 10px 20px;
      cursor: pointer;
      font-size: 1.2rem;
      transition: background 0.3s;
    }
    .qty-btn:hover { background: #333; }
    .qty-val {
      padding: 0 15px;
      font-weight: bold;
      font-size: 1.2rem;
    }

    .detail-actions {
      display: flex;
      gap: 20px;
      margin-bottom: 40px;
    }
    
    .info-tabs {
      border-bottom: 1px solid #333;
      margin-bottom: 20px;
    }
    .info-tabs button {
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 10px 20px;
      font-size: 1.1rem;
      cursor: pointer;
      position: relative;
    }
    .info-tabs button.active {
      color: var(--warm-gold);
    }
    .info-tabs button.active::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; width: 100%; height: 2px;
      background: var(--warm-gold);
    }

    .tab-content { display: none; color: var(--text-muted); }
    .tab-content.active { display: block; }
    
    .nutrition-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      text-align: center;
      margin-top: 20px;
    }
    .nut-box {
      background: #111;
      padding: 15px;
      border-radius: 8px;
    }
    .nut-box span { font-size: 0.8rem; color: #888; display: block; }
    .nut-box strong { font-size: 1.2rem; color: var(--cream); }

    ul.ingredients-list { margin-left: 20px; list-style-type: disc; }
    ul.ingredients-list li { margin-bottom: 8px; }

    /* Related */
    .related-section { padding: 40px 0 80px; }
    .related-scroll {
      display: flex;
      gap: 20px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .related-scroll::-webkit-scrollbar { display: none; }
    .related-card {
      min-width: 250px;
      background: var(--dark-grey);
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      cursor: pointer;
    }
    .related-card img { width: 100%; height: 160px; object-fit: cover; }
    .related-info { padding: 15px; }

    @media(max-width: 768px) {
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="page-fade-in">

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">Savor<span>.</span></a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="menu.html" style="color:var(--warm-gold);">Menu</a></li>
        <li><a href="reservations.html">Reservations</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <div class="nav-icons">
        <a href="cart.html" class="cart-icon">
          <i class="fas fa-shopping-cart"></i>
          <span class="cart-badge" id="cart-badge" style="display:none;">0</span>
        </a>
        <div class="user-menu">
          <div class="avatar" id="user-avatar-name">U</div>
          <button id="logout-btn" class="logout-btn"><i class="fas fa-sign-out-alt"></i></button>
        </div>
        <div class="hamburger"><i class="fas fa-bars"></i></div>
      </div>
    </div>
  </nav>

  <!-- DETAIL MAIN -->
  <main class="detail-section container" id="detail-container">
    <!-- Populated by JS -->
    <div style="text-align:center; padding: 100px;">
      <div class="spinner"></div> Loading item...
    </div>
  </main>

  <section class="related-section container">
    <h3 class="section-title" style="font-size: 2rem;">Similar Items</h3>
    <div class="related-scroll" id="related-scroll">
      <!-- Populated by JS -->
    </div>
  </section>

  <footer class="footer">
    <div class="container text-center text-muted">
      <p>&copy; 2026 Savor Restaurant.</p>
    </div>
  </footer>

  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const itemId = parseInt(urlParams.get('id'));
      
      const catalog = JSON.parse(localStorage.getItem('restaurant_catalog'));
      if (!catalog) {
        window.location.href = 'menu.html';
        return;
      }

      const item = catalog.find(i => i.id === itemId);
      if (!item) {
        document.getElementById('detail-container').innerHTML = '<h2 class="text-center">Item not found.</h2>';
        return;
      }

      renderDetail(item);
      renderRelated(item, catalog);
    });

    let currentQty = 1;

    function renderDetail(item) {
      const container = document.getElementById('detail-container');
      const badgeHtml = item.isVeg ? '<span class="veg-dot"></span> Vegetarian' : '<span class="non-veg-dot"></span> Non-Vegetarian';
      
      container.innerHTML = `
        <div class="detail-grid">
          <div class="detail-img">
            <div class="detail-badge">${item.category}</div>
            <img src="${item.image}" alt="${item.name}">
          </div>
          <div class="detail-content">
            <div style="margin-bottom: 10px;">${badgeHtml}</div>
            <h1>${item.name}</h1>
            <div class="detail-rating">
              <i class="fas fa-star"></i> ${item.rating} (${item.pop * 3} Reviews)
            </div>
            <div class="detail-price">₹${item.price}</div>
            <p class="detail-desc">${item.description}. Prepared with authentic spices and fresh ingredients to provide an unforgettable experience.</p>
            
            <div class="quantity-control">
              <button class="qty-btn" onclick="updateQty(-1)"><i class="fas fa-minus"></i></button>
              <span class="qty-val" id="qty-val">1</span>
              <button class="qty-btn" onclick="updateQty(1)"><i class="fas fa-plus"></i></button>
            </div>

            <div class="detail-actions">
              <button class="btn btn-primary" onclick="addCurrentToCart(${item.id})" style="flex-grow:1; font-size:1.1rem; padding: 15px;">Add to Cart - ₹<span id="btn-price">${item.price}</span></button>
            </div>

            <div class="info-tabs">
              <button class="active" onclick="switchTab('ingredients')">Ingredients</button>
              <button onclick="switchTab('nutrition')">Nutrition</button>
            </div>
            
            <div id="tab-ingredients" class="tab-content active">
              <ul class="ingredients-list">
                <li>Primary ingredient specific to ${item.name}</li>
                <li>Savor Signature Spice Mix</li>
                <li>Fresh locally sourced herbs</li>
                <li>Organic cold-pressed oils</li>
                <li>Himalayan Pink Salt</li>
              </ul>
            </div>
            
            <div id="tab-nutrition" class="tab-content">
              <div class="nutrition-grid">
                <div class="nut-box"><span>Calories</span><strong>${Math.floor(Math.random()*300 + 200)}</strong></div>
                <div class="nut-box"><span>Protein</span><strong>${Math.floor(Math.random()*30 + 5)}g</strong></div>
                <div class="nut-box"><span>Carbs</span><strong>${Math.floor(Math.random()*40 + 10)}g</strong></div>
                <div class="nut-box"><span>Fat</span><strong>${Math.floor(Math.random()*20 + 5)}g</strong></div>
              </div>
            </div>

          </div>
        </div>
      `;
    }

    function updateQty(change) {
      const param = new URLSearchParams(window.location.search);
      const itemId = parseInt(param.get('id'));
      const catalog = JSON.parse(localStorage.getItem('restaurant_catalog'));
      const item = catalog.find(i => i.id === itemId);

      currentQty += change;
      if (currentQty < 1) currentQty = 1;
      
      document.getElementById('qty-val').innerText = currentQty;
      document.getElementById('btn-price').innerText = item.price * currentQty;
    }

    function addCurrentToCart(id) {
      const catalog = JSON.parse(localStorage.getItem('restaurant_catalog'));
      const item = catalog.find(i => i.id === id);
      if (!item) return;

      let cart = JSON.parse(localStorage.getItem('restaurant_cart') || '[]');
      const existing = cart.find(c => c.id === id);
      if (existing) {
        existing.quantity += currentQty;
      } else {
        cart.push({...item, quantity: currentQty});
      }

      localStorage.setItem('restaurant_cart', JSON.stringify(cart));
      window.dispatchEvent(new Event('storage'));
      
      const btn = document.querySelector('.detail-actions .btn');
      btn.innerHTML = '<i class="fas fa-check"></i> Added To Cart';
      setTimeout(() => {
        btn.innerHTML = `Add to Cart - ₹<span id="btn-price">${item.price * currentQty}</span>`;
      }, 2000);
    }

    function switchTab(tabId) {
      document.querySelectorAll('.info-tabs button').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      
      event.target.classList.add('active');
      document.getElementById(`tab-${tabId}`).classList.add('active');
    }

    function renderRelated(item, catalog) {
      const scroll = document.getElementById('related-scroll');
      const related = catalog.filter(i => i.category === item.category && i.id !== item.id).slice(0, 5);
      
      if(related.length === 0) {
        scroll.innerHTML = '<div style="color:#aaa;">No related items found.</div>';
        return;
      }

      related.forEach(r => {
        scroll.innerHTML += `
          <div class="related-card" onclick="window.location.href='item-detail.html?id=${r.id}'">
            <img src="${r.image}" alt="${r.name}">
            <div class="related-info">
              <h4 style="margin-bottom:5px; color:var(--cream);">${r.name}</h4>
              <div style="color:var(--warm-gold); font-weight:bold;">₹${r.price}</div>
            </div>
          </div>
        `;
      });
    }
  </script>
</body>
</html>
